<!DOCTYPE html>
<html>

<head>

    <title>F1 Race Predictor</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>

        body {
            font-family: Arial;
            background-color: black;
            color: white;
            text-align: center;
            margin-top: 50px;
        }

        input {
            padding: 10px;
            margin: 10px;
            width: 220px;
            font-size: 16px;
        }

        select {
            padding: 10px;
            margin: 10px;
            width: 240px;
            font-size: 16px;
        }

        button {
            padding: 12px 24px;
            background-color: red;
            color: white;
            border: none;
            font-size: 16px;
            cursor: pointer;
            margin: 10px;
        }

        button:hover {
            background-color: darkred;
        }

        #result {
            margin-top: 25px;
            font-size: 28px;
            font-weight: bold;
            color: yellow;
        }

        #bar-container {
            width: 300px;
            height: 30px;
            background-color: #333;
            margin: 20px auto;
            border-radius: 10px;
            overflow: hidden;
        }

        #bar {
            height: 100%;
            width: 0%;
            background-color: red;
            transition: width 0.5s;
        }

        #driver-card {

            width: 380px;

            margin: 20px auto;

            padding: 20px;

            border-radius: 15px;

            background-color: #111;

            border: 3px solid red;

            transition: 0.5s;

        }

        #driver-image {

            width: 200px;

            border-radius: 15px;

            margin-bottom: 15px;

        }

        #team-logo {

            width: 120px;

            margin-top: 15px;

            background-color: white;

            padding: 10px;

            border-radius: 10px;

        }

        .stats {

            margin-top: 20px;

            text-align: left;

            padding-left: 40px;

            font-size: 20px;

        }

        .stats p {

            margin: 10px 0;

        }

        #chart-container {

            width: 700px;

            margin: 40px auto;

            background-color: #111;

            padding: 20px;

            border-radius: 15px;

        }

        table {

            width: 700px;

            margin: 30px auto;

            border-collapse: collapse;

            background-color: #111;

        }

        th, td {

            border: 1px solid #333;

            padding: 15px;

            text-align: center;

        }

        th {

            background-color: red;

        }

    </style>

</head>

<body>

    <h1>🏎️ F1 Race Predictor</h1>

    <input
        type="number"
        id="grid"
        placeholder="Grid Position"
    >

    <br>

    <input
        type="number"
        id="points"
        placeholder="Points"
    >

    <br>

    <select id="driver">

        <option value="12">Max Verstappen</option>

        <option value="17">Sergio Perez</option>

        <option value="4">Fernando Alonso</option>

        <option value="1">Carlos Sainz</option>

        <option value="10">Lewis Hamilton</option>

    </select>

    <br>

    <select id="team">

        <option value="8">Red Bull</option>

        <option value="3">Aston Martin</option>

        <option value="4">Ferrari</option>

        <option value="7">Mercedes</option>

    </select>

    <br><br>

    <button onclick="predictWinner()">
        Predict Winner
    </button>

    <button onclick="simulateRace()">
        Simulate Race
    </button>

    <div id="result"></div>

    <div id="bar-container">

        <div id="bar"></div>

    </div>

    <div id="driver-card">

        <img id="driver-image" src="">

        <h2 id="driver-name"></h2>

        <h3 id="team-name"></h3>

        <img id="team-logo" src="">

        <div class="stats">

            <p id="wins"></p>

            <p id="podiums"></p>

            <p id="championships"></p>

        </div>

    </div>

    <div id="chart-container">

        <canvas id="predictionChart"></canvas>

    </div>

    <h2>🏁 Live Prediction Leaderboard</h2>

    <table>

        <thead>

            <tr>

                <th>Position</th>

                <th>Driver</th>

                <th>Win Probability</th>

            </tr>

        </thead>

        <tbody id="leaderboard-body">

        </tbody>

    </table>

    <script>

        let chartLabels = [];

        let chartData = [];

        let leaderboardData = [];

        const ctx =
            document.getElementById('predictionChart');

        const predictionChart = new Chart(ctx, {

            type: 'line',

            data: {

                labels: chartLabels,

                datasets: [{

                    label: 'Win Probability %',

                    data: chartData,

                    borderColor: 'red',

                    backgroundColor: 'rgba(255,0,0,0.2)',

                    tension: 0.3

                }]

            },

            options: {

                responsive: true,

                scales: {

                    y: {

                        beginAtZero: true,

                        max: 100

                    }

                }

            }

        });

        let imageMap = {

            "Max Verstappen": "images/max.png",

            "Sergio Perez": "images/perez.png",

            "Fernando Alonso": "images/alonso.png",

            "Carlos Sainz": "images/sainz.png",

            "Lewis Hamilton": "images/hamilton.png"

        };

        let logoMap = {

            "Red Bull": "images/redbull.png",

            "Aston Martin": "images/astonmartin.png",

            "Ferrari": "images/ferrari.png",

            "Mercedes": "images/mercedes.png"

        };

        let teamColors = {

            "Red Bull": "#0600EF",

            "Aston Martin": "#006F62",

            "Ferrari": "#DC0000",

            "Mercedes": "#00D2BE"

        };

        let driverStats = {

            "Max Verstappen": {
                wins: 63,
                podiums: 110,
                championships: 3
            },

            "Sergio Perez": {
                wins: 6,
                podiums: 39,
                championships: 0
            },

            "Fernando Alonso": {
                wins: 32,
                podiums: 106,
                championships: 2
            },

            "Carlos Sainz": {
                wins: 4,
                podiums: 27,
                championships: 0
            },

            "Lewis Hamilton": {
                wins: 105,
                podiums: 202,
                championships: 7
            }

        };

        async function predictWinner() {

            let grid =
                document.getElementById("grid").value;

            let points =
                document.getElementById("points").value;

            let driver =
                document.getElementById("driver").value;

            let team =
                document.getElementById("team").value;

            let driverText =
                document.getElementById("driver").options[
                    document.getElementById("driver").selectedIndex
                ].text;

            let teamText =
                document.getElementById("team").options[
                    document.getElementById("team").selectedIndex
                ].text;

            await makePrediction(
                grid,
                points,
                driver,
                team,
                driverText,
                teamText
            );

        }

        async function makePrediction(
            grid,
            points,
            driver,
            team,
            driverText,
            teamText
        ) {

            try {

                let response = await fetch(
                    `http://https://f1-backend-kwlj.onrender.com/predict?grid=${grid}&points=${points}&driver=${driver}&team=${team}`
                );

                let data = await response.json();

                let probability =
                    (data.win_probability * 100).toFixed(2);

                document.getElementById("result").innerHTML =
                    "Win Probability: " + probability + "%";

                document.getElementById("bar").style.width =
                    probability + "%";

                document.getElementById("bar").style.backgroundColor =
                    teamColors[teamText];

                document.getElementById("driver-name").innerHTML =
                    driverText;

                document.getElementById("team-name").innerHTML =
                    teamText;

                document.getElementById("driver-image").src =
                    imageMap[driverText];

                document.getElementById("team-logo").src =
                    logoMap[teamText];

                document.getElementById("driver-card").style.borderColor =
                    teamColors[teamText];

                document.getElementById("wins").innerHTML =
                    "🏆 Wins: " +
                    driverStats[driverText].wins;

                document.getElementById("podiums").innerHTML =
                    "🥇 Podiums: " +
                    driverStats[driverText].podiums;

                document.getElementById("championships").innerHTML =
                    "🌍 Championships: " +
                    driverStats[driverText].championships;

                chartLabels.push(driverText);

                chartData.push(probability);

                predictionChart.update();

                leaderboardData.push({
                    driver: driverText,
                    probability: probability
                });

                leaderboardData.sort(
                    (a, b) =>
                    b.probability - a.probability
                );

                updateLeaderboard();

            }

            catch(error) {

                console.log(error);

            }

        }

        function updateLeaderboard() {

            let tableBody =
                document.getElementById(
                    "leaderboard-body"
                );

            tableBody.innerHTML = "";

            leaderboardData.forEach(
                (entry, index) => {

                tableBody.innerHTML += `
                    <tr>
                        <td>${index + 1}</td>
                        <td>${entry.driver}</td>
                        <td>${entry.probability}%</td>
                    </tr>
                `;

            });

        }

        async function simulateRace() {

            leaderboardData = [];

            chartLabels = [];

            chartData = [];

            predictionChart.data.labels = [];

            predictionChart.data.datasets[0].data = [];

            predictionChart.update();

            let drivers = [

                {
                    name: "Max Verstappen",
                    driver: 12,
                    team: 8,
                    teamName: "Red Bull",
                    grid: 1,
                    points: 25
                },

                {
                    name: "Lewis Hamilton",
                    driver: 10,
                    team: 7,
                    teamName: "Mercedes",
                    grid: 3,
                    points: 18
                },

                {
                    name: "Fernando Alonso",
                    driver: 4,
                    team: 3,
                    teamName: "Aston Martin",
                    grid: 4,
                    points: 15
                },

                {
                    name: "Carlos Sainz",
                    driver: 1,
                    team: 4,
                    teamName: "Ferrari",
                    grid: 2,
                    points: 20
                },

                {
                    name: "Sergio Perez",
                    driver: 17,
                    team: 8,
                    teamName: "Red Bull",
                    grid: 5,
                    points: 12
                }

            ];

            for (let d of drivers) {

                await makePrediction(
                    d.grid,
                    d.points,
                    d.driver,
                    d.team,
                    d.name,
                    d.teamName
                );

            }

        }

    </script>

</body>

</html>
